<!DOCTYPE html>
<html>
<head>
<title>AI Placement Predictor</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Student Placement Prediction</h1>

<form method="POST">

<input type="number" step="0.01" name="gpa" placeholder="Enter GPA" required>

<input type="number" name="coding" placeholder="Coding Problems Solved" required>

<select name="ml_skill">
<option value="1">ML Skill - Yes</option>
<option value="0">ML Skill - No</option>
</select>

<select name="internship">
<option value="1">Internship - Yes</option>
<option value="0">Internship - No</option>
</select>

<button type="submit">Predict Placement</button>

</form>

{% if result %}
<h3>{{ result }}</h3>

<p>Placement Probability: <b>{{ probability }}%</b></p>

{% endif %}

</div>

</body>
</html>
