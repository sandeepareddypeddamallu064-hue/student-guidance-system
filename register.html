<!DOCTYPE html>
<html>
<head>
<title>Register</title>
</head>
<body>

<h2>Student Registration</h2>

<form method="POST">

Name<br>
<input type="text" name="name" required><br><br>

Email<br>
<input type="email" name="email" required><br><br>

Password<br>
<input type="password" name="password" required><br><br>

GPA<br>
<input type="number" step="0.1" name="gpa"><br><br>

Coding Problems<br>
<input type="number" name="coding"><br><br>

ML Skill (0-1)<br>
<input type="number" name="ml_skill"><br><br>

Internship<br>
<input type="number" name="internship"><br><br>

<button type="submit">Register</button>

</form>

</body>
</html>
